version: '3.8'

services:
  # ── Backend: Node.js + Python (single container) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - PYTHON_SERVICE_URL=http://localhost:8000
    volumes:
      - tts_audio:/app/public/tts
      - vectordb:/app/python/vectordb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend: Vite build served by Nginx ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tts_audio:
  vectordb:
